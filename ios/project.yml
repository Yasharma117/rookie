name: LinkSaver

options:
  bundleIdPrefix: com.becauseyssaidso
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: "YES"

configs:
  Debug: debug
  Release: release

targets:
  LinkSaver:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LinkSaver
      - path: Shared
      - path: ShareExtension
        excludes:
          - "ShareViewController.swift"
          - "Info.plist"
          - "ShareExtension.entitlements"
    dependencies:
      - target: ShareExtension
        embed: true
    entitlements:
      path: LinkSaver/LinkSaver.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.becauseyssaidso.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.becauseyssaidso.shared
    info:
      path: LinkSaver/Info.plist
      properties:
        CFBundleDisplayName: LinkSaver
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIBackgroundModes:
          - fetch
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        LSApplicationQueriesSchemes:
          - instagram
          - youtube
          - linkedin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.becauseyssaidso.LinkSaver
        CODE_SIGN_ENTITLEMENTS: LinkSaver/LinkSaver.entitlements
        DEVELOPMENT_TEAM: ""

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
      - path: Shared
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.becauseyssaidso.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.becauseyssaidso.shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save to LinkSaver
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.becauseyssaidso.LinkSaver.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: "YES"
        DEVELOPMENT_TEAM: ""

schemes:
  LinkSaver:
    build:
      targets:
        LinkSaver: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
